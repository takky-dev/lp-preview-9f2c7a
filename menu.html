<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山脇建設工業 HP案 — 2案比較</title>
<style>
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #f4f6f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 32px 16px;
    box-sizing: border-box;
  }
  h1 { font-size: 22px; color: #0f1b2d; margin-bottom: 8px; }
  p { font-size: 14px; color: #6b7280; margin-bottom: 40px; }
  .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    padding: 32px 28px;
    width: 280px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.14); }
  .badge { font-size: 11px; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 12px; display: inline-block; padding: 4px 10px; border-radius: 20px; }
  .badge-a { background: #0f1b2d; color: #f5a623; }
  .badge-b { background: #f5a623; color: #0f1b2d; }
  .card-title { font-size: 20px; font-weight: bold; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
  .card-copy { font-size: 16px; font-style: italic; color: #0f1b2d; border-left: 3px solid #f5a623; padding-left: 10px; }
  .arrow { margin-top: 20px; font-size: 13px; color: #f5a623; font-weight: bold; }
</style>
</head>
<body>
  <h1>山脇建設工業 HP案 — 2パターン</h1>
  <p>それぞれクリックしてご確認ください</p>
  <div class="cards">
    <a class="card" href="index.html">
      <span class="badge badge-a">PATTERN A</span>
      <div class="card-title">紺 × オレンジ</div>
      <div class="card-sub">硬派・信頼・重厚感</div>
      <div class="card-copy">「骨格から、仕上げまで。<br>街の強さを手がける会社。」</div>
      <div class="arrow">→ 開く</div>
    </a>
    <a class="card" href="index_b.html">
      <span class="badge badge-b">PATTERN B</span>
      <div class="card-title">白 × オレンジ</div>
      <div class="card-sub">人柄・親しみやすさ・明るさ</div>
      <div class="card-copy">「仕事は、人がつくる。」</div>
      <div class="arrow">→ 開く</div>
    </a>
  </div>
</body>
</html>
